name: Deploy Backend

on:
  push:
    paths:
      - 'backend/**'

jobs:
  deploy-backend-ssh:
    runs-on: ubuntu-latest

    steps:
      - name: SSH Deploy Backend
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd ~/finote/ops/backend
            ./deploy_be.sh